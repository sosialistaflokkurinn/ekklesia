<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Loading...</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/styles/global.css">
  <link rel="stylesheet" href="/styles/components/nav.css">
  <link rel="stylesheet" href="/styles/components/page.css">
  <link rel="stylesheet" href="/styles/events.css">
</head>
<body class="authenticated">
  <!-- Navigation -->
  <nav class="nav">
    <div class="nav__container">
      <a href="/dashboard.html" class="nav__brand" id="nav-brand">Loading...</a>

      <!-- Hamburger Button (mobile only) -->
      <button class="nav__hamburger" id="nav-hamburger" aria-expanded="false">
        <span class="nav__hamburger-line"></span>
        <span class="nav__hamburger-line"></span>
        <span class="nav__hamburger-line"></span>
      </button>

      <!-- Overlay for mobile menu -->
      <div class="nav__overlay" id="nav-overlay"></div>

      <!-- Navigation Drawer -->
      <div class="nav__drawer" id="nav-drawer" aria-hidden="true">
        <!-- Close button (mobile only) -->
        <button class="nav__close" id="nav-close">
          <span class="nav__close-icon">✕</span>
        </button>

        <div class="nav__links">
          <a href="/dashboard.html" class="nav__link" id="nav-dashboard">Loading...</a>
          <a href="/profile.html" class="nav__link" id="nav-profile">Loading...</a>
          <a href="/events.html" class="nav__link nav__link--active" id="nav-events">Loading...</a>
          <a href="/elections.html" class="nav__link" id="nav-voting">Loading...</a>
          <a href="#" class="nav__link nav__link--logout" id="nav-logout">Loading...</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Page Content -->
  <div class="page__container">
    <section class="events">
      <div class="events__header">
        <h1 id="events-title">Loading...</h1>
        <p id="events-subtitle">Loading...</p>
      </div>

      <!-- Filter Tabs -->
      <div class="events__tabs">
        <button class="events__tab events__tab--active" data-filter="upcoming" id="tab-upcoming">
          <span id="tab-upcoming-label">Loading...</span>
        </button>
        <button class="events__tab" data-filter="past" id="tab-past">
          <span id="tab-past-label">Loading...</span>
        </button>
      </div>

      <!-- Loading State -->
      <div id="events-loading" class="events__loading u-hidden">
        <div class="spinner"></div>
        <p id="loading-message">Loading...</p>
      </div>

      <!-- Error State -->
      <div id="events-error" class="events__error u-hidden">
        <p id="error-message">Loading...</p>
      </div>

      <!-- Empty State -->
      <div id="events-empty" class="events__empty u-hidden">
        <p id="empty-message">Loading...</p>
      </div>

      <!-- Events List -->
      <div id="events-list" class="events__list u-hidden">
        <!-- Events will be dynamically inserted here -->
      </div>
    </section>
  </div>

  <script type="module" src="/js/events.js"></script>
</body>
</html>
